version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sutravak-backend:latest
    ports:
      - "9001:9001"
    volumes:
      # Persist generated audio outputs to the host PC
      - ./backend/outputs:/app/outputs
      # Persist custom uploaded reference voices to the host PC
      - ./backend/voices:/app/voices
      # Persist Hugging Face model cache on the host PC so it doesn't download 4GB on every run
      - ./backend/huggingface_cache:/app/huggingface_cache
      - ./backend:/app
    environment:
      - PYTORCH_ENABLE_MPS_FALLBACK=1
      - HF_HOME=/app/huggingface_cache
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sutravak-frontend:latest
    ports:
      - "2001:2001"
    environment:
      - VITE_BACKEND_TARGET=http://backend:9001
    depends_on:
      - backend
    restart: unless-stopped
